<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administration - OG Association</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#1a1208;
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:60px 20px 30px;
}

.header h1{
font-size:34px;
letter-spacing:2px;
color:#d4a54a;
}

.back-btn{
margin-top:20px;
display:inline-block;
padding:12px 30px;
border-radius:50px;
background:linear-gradient(135deg,#d4a54a,#8b5e2a);
text-decoration:none;
color:white;
font-weight:600;
transition:.3s;
}

.back-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(212,165,74,0.4);
}

/* TEAM GRID */
.team{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:40px 20px;
}

.card{
background:#120d07;
padding:25px;
width:220px;
border-radius:15px;
text-align:center;
border:1px solid #ffffff14;
transition:.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 10px 30px rgba(212,165,74,0.25);
}

.icon{
width:75px;
height:75px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:15px;
border:3px solid;
box-shadow:0 0 15px rgba(212,165,74,0.3);
}

.icon i{
color:white;
font-size:26px;
}

/* COLORS */
.gold{border-color:#d4a54a;}
.orange{border-color:#ff7a18;}
.blue{border-color:#3b82f6;}
.cyan{border-color:#00eaff;}
.pink{border-color:#ff4da6;}
.green{border-color:#00ffa6;}
.purple{border-color:#a855f7;}
.red{border-color:#ef4444;}

h2{
margin:10px 0 5px;
}

p{
font-size:13px;
color:#aaa;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="header">
<h1>CORE ADMINISTRATION</h1>
<a href="index.html" class="back-btn">← Back to Site</a>
</div>

<div class="team">

<div class="card">
<div class="icon gold"><i class="fas fa-crown"></i></div>
<h2>DARK</h2>
<p>OWNER</p>
</div>

<div class="card">
<div class="icon orange"><i class="fas fa-chess-king"></i></div>
<h2>XONE</h2>
<p>CO-FOUNDER / A.A.H</p>
</div>

<div class="card">
<div class="icon cyan"><i class="fas fa-user-shield"></i></div>
<h2>EREN</h2>
<p>CO-FOUNDER / MODERATOR</p>
</div>

<div class="card">
<div class="icon gold"><i class="fas fa-user-secret"></i></div>
<h2>Star</h2>
<p>ADMIN / Co-ordinator</p>
</div>

<div class="card">
<div class="icon blue"><i class="fas fa-star"></i></div>
<h2>Bristi</h2>
<p>SENIOR ADMIN</p>
</div>

<div class="card">
<div class="icon pink"><i class="fas fa-user-doctor"></i></div>
<h2>TOIBA</h2>
<p>ADMIN</p>
</div>

<div class="card">
<div class="icon green"><i class="fas fa-user-graduate"></i></div>
<h2>Aarushi</h2>
<p>ADMIN</p>
</div>

<div class="card">
<div class="icon purple"><i class="fas fa-user-check"></i></div>
<h2>Elisha</h2>
<p>ADMIN</p>
</div>

<div class="card">
<div class="icon cyan"><i class="fas fa-code"></i></div>
<h2>Saurav</h2>
<p>DEVELOPER</p>
</div>
  
<div class="card">
<div class="icon red"><i class="fas fa-fire"></i></div>
<h2>Tanjiro</h2>
<p>ADMIN</p>
</div>

<div class="card">
<div class="icon cyan"><i class="fas fa-people-arrows"></i></div>
<h2>Yagami</h2>
<p>ADMIN</p>
</div>

<div class="card">
<div class="icon orange"><i class="fas fa-brain"></i></div>
<h2>SATYAM</h2>
<p>ADMIN</p>
</div>

<div class="card">
<div class="icon blue"><i class="fas fa-bolt"></i></div>
<h2>Aditya Verma</h2>
<p>ADMIN</p>
</div>

</div>

</body>
</html>
